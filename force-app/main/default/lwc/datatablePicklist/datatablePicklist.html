<template>
    <div class="picklistBlock" id="picklist">
        <template lwc:if={showPicklist}>
            <div class="picklist-container slds-is-absolute">
                <lightning-combobox
                    variant={variant}
                    name={name}
                    label={label}
                    value={value}
                    placeholder={placeholder}
                    options={options}
                    onchange={handleChange}
                    onblur={handleBlur}
                    dropdown-alignment="auto"
                >
                </lightning-combobox>
            </div>
        </template>
        <template lwc:else>
            <div class="slds-table_edit_container slds-is-relative">
                <span class="slds-grid slds-grid_align-spread slds-cell-edit">
                    <span class="slds-truncate" title={value}>{value}</span>
                    <button
                        data-id={context}
                        class="slds-button slds-button_icon slds-cell-edit__button slds-m-left_x-small"
                        tabindex="-1"
                        title="Edit"
                        onclick={handleClick}
                    >
                        <svg
                            class="slds-button__icon slds-button__icon_hint slds-button__icon_small slds-icon slds-icon-text-default slds-icon_xx-small"
                            aria-hidden="true"
                        >
                            <use
                                xlink:href="/_slds/icons/utility-sprite/svg/symbols.svg#edit"
                            ></use>
                        </svg>
                        <span class="slds-assistive-text">Edit</span>
                    </button>
                </span>
            </div>
        </template>
    </div>
</template>
