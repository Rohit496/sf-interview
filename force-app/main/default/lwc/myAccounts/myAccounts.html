<template>
    <div class="slds-card">
        <!-- Header -->
        <div class="accounts-header slds-var-p-around_medium">
            <h2 class="slds-text-heading_medium slds-text-color_inverse accounts-title">{title}</h2>
        </div>

        <!-- Loading spinner -->
        <template if:true={isLoading}>
            <div class="slds-align_absolute-center slds-var-p-around_medium">
                <lightning-spinner
                    alternative-text="Loading accounts"
                    size="medium"
                ></lightning-spinner>
            </div>
        </template>

        <!-- Error state -->
        <template if:true={hasError}>
            <div class="slds-var-p-around_medium">
                <p class="slds-text-color_error">{errorMessage}</p>
            </div>
        </template>

        <!-- Account datatable -->
        <template if:false={isLoading}>
            <div class="slds-var-p-around_small">
                <lightning-datatable
                    key-field="Id"
                    data={accounts}
                    columns={columns}
                    hide-checkbox-column
                ></lightning-datatable>

                <!-- Footer count -->
                <div
                    class="slds-box slds-text-align_center footer-pill slds-var-p-around_small"
                >
                    <p class="slds-text-body_small footer-text">{footerText}</p>
                </div>
            </div>
        </template>
    </div>
</template>
